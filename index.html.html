<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego de Limones</title>
    <link rel="stylesheet" href="limones.css">
    <script src="util.js"></script>
</head>
<body onload="iniciar()">

    <div class="contenedor">
        <h1>🍋 Atrapa los Limones</h1>

        <div class="panel">
            <div class="marcador">
                <span>⭐ Puntaje: <strong id="txtPuntaje">0</strong></span>
                <span>❤️ Vidas: <strong id="txtVidas">3</strong></span>
            </div>
        </div>

        <div class="juego-box">
            <canvas id="areaJuego" width="400" height="400"></canvas>
        </div>

        <div class="botones">
            <button onclick="moverIzquierda()">⬅️</button>
            <button onclick="moverDerecha()">➡️</button>
        </div>

        <div class="acciones">
            <button onclick="reiniciar()">🔄 Reiniciar</button>
        </div>
    </div>

    <script src="limones.js"></script>
</body>
</html>
